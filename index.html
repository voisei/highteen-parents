<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>백은성 & 하루 갤러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#e8ecef;
    --card:#ffffff;
    --ink:#26323f;
    --muted:#6b7883;
    --line:#d3d9de;
    --rose:#d97a8c;
    --rose-deep:#a84f61;
    --film:#26323f;
    --shadow:0 6px 22px rgba(38,50,63,.10);
    --thumb-ratio: 4 / 5;   /* 썸네일 비율. 원본이 가로면 16/10 등으로 바꾸세요 */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Gothic A1', sans-serif;
    -webkit-font-smoothing:antialiased; padding:0 0 4rem;
  }
  .wrap{ max-width:1200px; margin:0 auto; padding:0 24px; }

  header{ padding:44px 0 0; }
  .eyebrow{
    font-family:'Space Mono', monospace; font-size:12px; letter-spacing:.28em;
    color:var(--rose-deep); text-transform:uppercase; margin-bottom:12px;
  }
  h1{
    font-family:'Gowun Batang', serif; font-size:40px; font-weight:700;
    line-height:1.15; letter-spacing:-.01em;
  }
  h1 .accent{ color:var(--rose-deep); }
  .sub{ color:var(--muted); font-size:15px; margin-top:10px; max-width:46ch; line-height:1.6; }

  .filmstrip{
    position:relative; height:26px; margin:26px 0 24px;
    background:var(--film); border-radius:3px;
  }
  .filmstrip::before, .filmstrip::after{
    content:""; position:absolute; left:6px; right:6px; height:6px;
    background-image:repeating-linear-gradient(to right, var(--bg) 0 8px, transparent 8px 16px);
    border-radius:2px;
  }
  .filmstrip::before{ top:5px; }
  .filmstrip::after{ bottom:5px; }

  /* ---- controls ---- */
  .controls{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap; margin-bottom:22px;
  }
  .tabs{ display:flex; gap:8px; }
  .tab{
    font-family:'Gothic A1',sans-serif; font-size:15px; font-weight:500;
    color:var(--muted); background:transparent; border:1px solid var(--line);
    padding:9px 18px; border-radius:999px; cursor:pointer;
    transition:all .15s ease;
  }
  .tab .c{ font-family:'Space Mono',monospace; font-size:12px; opacity:.8; margin-left:6px; }
  .tab:hover{ border-color:var(--rose); color:var(--ink); }
  .tab.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .tab.active .c{ opacity:.7; }

  .search{
    display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line);
    border-radius:999px; padding:0 16px; min-width:220px; flex:1; max-width:320px;
  }
  .search:focus-within{ border-color:var(--rose); }
  .search input{
    border:none; outline:none; background:transparent;
    font-family:'Gothic A1',sans-serif; font-size:14px; color:var(--ink);
    padding:10px 0; width:100%;
  }
  .search .ic{ color:var(--muted); font-size:15px; }

  /* ---- grid ---- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:16px;
  }
  .frame{
    position:relative; display:block; width:100%; background:var(--card);
    border:1px solid var(--line); border-radius:12px; overflow:hidden;
    cursor:pointer; padding:0; text-align:left;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .frame:hover, .frame:focus-visible{
    transform:translateY(-4px); box-shadow:var(--shadow);
    border-color:var(--rose); outline:none;
  }
  .frame:focus-visible{ box-shadow:0 0 0 3px rgba(217,122,140,.35); }
  .thumb{
    position:relative; width:100%; aspect-ratio:var(--thumb-ratio);
    background:#eef1f3; overflow:hidden;
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .who{
    position:absolute; top:8px; left:8px; z-index:2;
    font-size:11px; font-weight:700; color:#fff;
    background:rgba(38,50,63,.72); padding:3px 9px; border-radius:6px;
  }
  .who.haru{ background:rgba(168,79,97,.82); }
  .cap{ padding:10px 12px 12px; font-size:14px; color:var(--ink); font-weight:500; }
  .thumb.missing{
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:6px; background:#f3f0f1; color:var(--rose-deep); text-align:center; padding:12px;
  }
  .thumb.missing span{ font-size:12px; line-height:1.4; }
  .thumb.missing .mi{ font-size:22px; }

  .empty{
    text-align:center; color:var(--muted); padding:60px 0;
    font-size:15px; grid-column:1/-1;
  }

  /* ---- lightbox ---- */
  .lb{
    position:fixed; inset:0; z-index:50; background:rgba(20,24,28,.94);
    display:none; align-items:center; justify-content:center; padding:28px;
  }
  .lb.open{ display:flex; }
  .lb img{
    max-width:100%; max-height:82vh; object-fit:contain;
    border-radius:6px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .lb-cap{ position:absolute; bottom:22px; left:0; right:0; text-align:center; color:#e8ecef; }
  .lb-cap .name{ font-size:16px; font-weight:500; }
  .lb-cap .idx{ font-family:'Space Mono',monospace; font-size:12px; color:#9aa6b0; margin-top:4px; letter-spacing:.1em; }
  .lb-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22);
    color:#fff; font-size:24px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s ease;
  }
  .lb-btn:hover{ background:rgba(217,122,140,.55); }
  .lb-prev{ left:20px; } .lb-next{ right:20px; }
  .lb-close{
    position:absolute; top:20px; right:22px; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22);
    color:#fff; font-size:22px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s ease;
  }
  .lb-close:hover{ background:rgba(217,122,140,.55); }

  @media (max-width:560px){
    h1{ font-size:30px; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px; }
    .controls{ flex-direction:column; align-items:stretch; }
    .search{ max-width:none; }
    .lb-btn{ width:44px; height:44px; font-size:20px; }
  }
  @media (prefers-reduced-motion:reduce){ .frame{ transition:none; } }
</style>
</head>
<body>

  <div class="wrap">
    <header>
      <div class="eyebrow">In-game gallery · 플레이 컷 모음</div>
      <h1>백은성 <span class="accent">&amp;</span> 하루 갤러리</h1>
      <p class="sub">플레이하면서 만날 수 있는 은성이와 하루의 표정·순간들이에요. 위 검색창에 상황(예: 웃음, 눈물)을 적으면 그 장면만 골라볼 수 있어요.</p>
    </header>

    <div class="filmstrip" aria-hidden="true"></div>

    <div class="controls">
      <div class="tabs" id="tabs">
        <button class="tab active" data-char="백은성">백은성 <span class="c" id="cnt-eun">0</span></button>
        <button class="tab" data-char="하루">하루 <span class="c" id="cnt-haru">0</span></button>
      </div>
      <label class="search">
        <span class="ic">🔍</span>
        <input type="text" id="search" placeholder="표정·상황 검색 (예: 웃음, 버스)" aria-label="상황 검색" />
      </label>
    </div>

    <main class="grid" id="grid" aria-label="갤러리"></main>
  </div>

  <!-- 라이트박스 -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="확대 보기">
    <button class="lb-close" id="lbClose" aria-label="닫기">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="이전 사진">‹</button>
    <img id="lbImg" alt="" />
    <button class="lb-btn lb-next" id="lbNext" aria-label="다음 사진">›</button>
    <div class="lb-cap">
      <div class="name" id="lbName"></div>
      <div class="idx" id="lbIdx"></div>
    </div>
  </div>

<script>
  /* ====== 여기만 상황에 맞게 바꾸세요 ====== */
  const CONFIG = {
    folder: "",     // 이미지가 이 HTML과 같은 폴더면 그대로 "". 다른 폴더면 "images/" 처럼
    ext: "jpeg",    // 확장자
  };
  /* ======================================== */

  const EUNSEONG = ["고독","고백받음","놀이공원","당황","독서","등교길지각","땀닦기","메롱","물마심","미소","버스","버스에서","버스에서졸다","부끄러움","비웃음","빡침","선생님심부름","수면","스마트폰","식사","쑥스러움","아이스크림먹기","아픔","양치","어색한사진찍기","어이없음","어쭈","외로움","운동","웃음","유저를놀림","유저머리쓰담쓰담","자전거","잠을자다","장보기","짜증","짜증남","칠판에씀","하교","하루와낮잠","하품","한교동을줌","한숨","화남","솔의눈마심","요리"];
  const HARU = ["갸웃","겁먹음","나무위에올라감","넘어짐","놀이","놀이공원","눈물","모래성쌓기","뿌듯함","삐짐","수면","술래잡기","식사","신남","아이스크림낼름","아픔","외침","울음","지렁이갖고장난","평상시"];

  const build = (char, list) => list.map(sit => ({
    char, sit,
    full: char + "_" + sit,
    src: CONFIG.folder + char + "_" + sit + "." + CONFIG.ext,
  }));
  const items = [...build("백은성", EUNSEONG), ...build("하루", HARU)];

  document.getElementById("cnt-eun").textContent = EUNSEONG.length;
  document.getElementById("cnt-haru").textContent = HARU.length;

  let tab = "백은성";
  let query = "";
  let view = [];   // 현재 화면에 보이는 목록 (라이트박스가 이걸 넘김)

  const grid = document.getElementById("grid");

  function activeItems(){
    return items.filter(it =>
      it.char === tab && (query === "" || it.sit.includes(query) || it.full.includes(query))
    );
  }

  function render(){
    view = activeItems();
    grid.innerHTML = "";
    if (view.length === 0){
      grid.innerHTML = `<div class="empty">"${query}" 에 맞는 컷이 없어요 🥲</div>`;
      return;
    }
    view.forEach((it, i) => {
      const card = document.createElement("button");
      card.className = "frame";
      card.setAttribute("aria-label", it.full + " 크게 보기");
      const whoClass = it.char === "하루" ? "who haru" : "who";
      card.innerHTML = `
        <div class="thumb">
          <span class="${whoClass}">${it.char}</span>
          <img src="${it.src}" alt="${it.full}" loading="lazy" />
        </div>
        <div class="cap">${it.sit}</div>`;
      card.addEventListener("click", () => openLB(i));

      const img = card.querySelector("img");
      img.addEventListener("error", () => {
        const thumb = card.querySelector(".thumb");
        thumb.classList.add("missing");
        thumb.innerHTML = `<span class="${whoClass}">${it.char}</span>
          <div class="mi">🖼️</div><span>이미지 없음<br>${it.full}.${CONFIG.ext}</span>`;
      });
      grid.appendChild(card);
    });
  }

  /* 탭 */
  document.getElementById("tabs").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    tab = btn.dataset.char;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === btn));
    render();
  });

  /* 검색 */
  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value.trim();
    render();
  });

  /* 라이트박스 */
  const lb = document.getElementById("lb");
  const lbImg = document.getElementById("lbImg");
  const lbName = document.getElementById("lbName");
  const lbIdx = document.getElementById("lbIdx");
  const pad = n => String(n).padStart(2, "0");
  let cur = 0;

  function openLB(i){
    cur = i; renderLB();
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
    document.getElementById("lbClose").focus();
  }
  function closeLB(){
    lb.classList.remove("open");
    document.body.style.overflow = "";
  }
  function step(d){ cur = (cur + d + view.length) % view.length; renderLB(); }
  function renderLB(){
    const it = view[cur];
    if (!it) return;
    lbImg.src = it.src; lbImg.alt = it.full;
    lbName.textContent = it.char + " · " + it.sit;
    lbIdx.textContent = pad(cur + 1) + " / " + pad(view.length);
  }

  document.getElementById("lbClose").addEventListener("click", closeLB);
  document.getElementById("lbPrev").addEventListener("click", () => step(-1));
  document.getElementById("lbNext").addEventListener("click", () => step(1));
  lb.addEventListener("click", e => { if (e.target === lb) closeLB(); });
  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("open")) return;
    if (e.key === "Escape") closeLB();
    else if (e.key === "ArrowLeft") step(-1);
    else if (e.key === "ArrowRight") step(1);
  });

  render();
</script>
</body>
</html>
